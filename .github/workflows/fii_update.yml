name: FII Price Update

on:
  schedule:
    - cron: '0 14,16,17,19,21 * * *' # Roda às 11h, 13h, 14h, 16h e 18h de Brasília diariamente
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python preco/script2.py
